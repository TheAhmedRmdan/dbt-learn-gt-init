version: 2

sources:
  - name: jaffle_shop
    database: raw
    tables:
      - name: customer_web_activity
      - name: customers
        columns:
          - name: id
            data_type: number
            data_tests:
              - unique
              - not_null
          - name: first_name
            data_type: varchar
          - name: last_name
            data_type: varchar
      - name: items
      - name: locations
      - name: order_items
      - name: orders
        columns:
          - name: id
            data_type: number
            data_tests:
              - unique
              - not_null
          - name: user_id
            data_type: number
          - name: order_date
            data_type: date
          - name: status
            data_type: varchar
          - name: _etl_loaded_at
            data_type: timestamp_ntz
        config:
          freshness:
            warn_after:
              count: 1
              period: day
            error_after:
              count: 2
              period: day
          loaded_at_field: _etl_loaded_at
      - name: products
      - name: stores
      - name: supplies